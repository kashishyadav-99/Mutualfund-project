<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | AuraWealth — Smart Mutual Fund Investing</title>
  <meta name="description" content="Log in to your AuraWealth account to manage your mutual fund portfolio, track returns, and set up automated SIPs.">
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Auth Page Specific Styles ── */
    .auth-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: radial-gradient(ellipse at 70% 0%, rgba(16,185,129,0.08) 0%, transparent 60%),
                  radial-gradient(ellipse at 20% 100%, rgba(251,191,36,0.05) 0%, transparent 55%),
                  var(--navy);
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
    }

    /* Decorative circle right side */
    .auth-circle-bg {
      position: fixed;
      top: -120px;
      right: -160px;
      width: 560px;
      height: 560px;
      border-radius: 50%;
      border: 1.5px solid rgba(16,185,129,0.10);
      pointer-events: none;
      z-index: 0;
    }
    .auth-circle-bg::before {
      content: '';
      position: absolute;
      inset: 40px;
      border-radius: 50%;
      border: 1px solid rgba(16,185,129,0.07);
    }
    .auth-circle-bg::after {
      content: '';
      position: absolute;
      inset: 100px;
      border-radius: 50%;
      border: 1px solid rgba(16,185,129,0.05);
      background: radial-gradient(circle, rgba(16,185,129,0.04) 0%, transparent 70%);
    }

    /* Elegant line grid background */
    .auth-lines-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .auth-lines-bg svg {
      width: 100%;
      height: 100%;
      opacity: 0.7;
    }

    .auth-header {
      position: relative;
      z-index: 10;
      padding: 1.5rem 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .auth-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      position: relative;
      z-index: 2;
    }

    .auth-card {
      background: linear-gradient(145deg, rgba(26,48,85,0.95) 0%, rgba(16,32,64,0.92) 100%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 3rem 3.5rem;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 32px 64px -12px rgba(0,0,0,0.6), 0 0 0 1px rgba(16,185,129,0.05);
      backdrop-filter: blur(20px);
      position: relative;
      overflow: hidden;
    }

    .auth-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent-emerald), var(--accent-gold), var(--accent-emerald));
      background-size: 200% 100%;
      animation: shimmerGradient 4s infinite linear;
    }

    @keyframes shimmerGradient {
      0% { background-position: 0% 0%; }
      100% { background-position: 200% 0%; }
    }

    .auth-card-top {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .auth-logo-mark {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--accent-emerald), #059669);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.25rem;
      box-shadow: 0 8px 24px rgba(16,185,129,0.3);
      color: var(--navy);
    }

    .auth-card-top h1 {
      font-size: 1.875rem;
      margin-bottom: 0.5rem;
    }

    .auth-card-top p {
      color: var(--text-secondary);
      font-size: 0.95rem;
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .form-label {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-input-wrapper {
      position: relative;
    }

    .form-input-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
      transition: color 0.2s;
    }

    .form-input {
      width: 100%;
      background: rgba(10,22,40,0.8);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 0.875rem 1rem 0.875rem 2.75rem;
      color: var(--text-white);
      font-size: 0.975rem;
      transition: all 0.2s;
      outline: none;
    }

    .form-input::placeholder {
      color: var(--text-muted);
    }

    .form-input:focus {
      border-color: rgba(16,185,129,0.4);
      background: rgba(16,185,129,0.04);
      box-shadow: 0 0 0 3px rgba(16,185,129,0.08);
    }

    .form-input:focus + .form-input-icon,
    .form-input-wrapper:focus-within .form-input-icon {
      color: var(--accent-emerald);
    }

    .form-row-between {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: -0.5rem;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.875rem;
      color: var(--text-secondary);
      cursor: pointer;
    }

    .checkbox-label input[type="checkbox"] {
      accent-color: var(--accent-emerald);
      width: 15px;
      height: 15px;
    }

    .auth-link {
      font-size: 0.875rem;
      color: var(--accent-emerald);
      font-weight: 500;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .auth-link:hover { opacity: 0.75; }

    .btn-auth {
      background: linear-gradient(135deg, var(--accent-emerald), #059669);
      color: var(--navy);
      border: none;
      border-radius: 10px;
      padding: 1rem;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      box-shadow: 0 4px 14px rgba(16,185,129,0.3);
      margin-top: 0.5rem;
    }
    .btn-auth:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(16,185,129,0.45);
    }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      color: var(--text-muted);
      font-size: 0.8125rem;
    }
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.07);
    }

    .social-auth-btns {
      display: flex;
      gap: 1rem;
    }

    .btn-social {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 0.75rem;
      color: var(--text-secondary);
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .btn-social:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.15);
      color: var(--text-white);
      transform: translateY(-1px);
    }

    .auth-footer-text {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    .auth-trust-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      margin-top: 1.5rem;
      flex-wrap: wrap;
    }

    .auth-trust-item {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .auth-trust-item svg {
      color: var(--accent-emerald);
    }

    /* Password toggle */
    .password-toggle {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0;
      transition: color 0.2s;
    }
    .password-toggle:hover { color: var(--text-secondary); }

    @media (max-width: 600px) {
      .auth-card {
        padding: 2rem 1.5rem;
        border-radius: 20px;
        margin: 0 0.5rem;
      }
      .social-auth-btns { flex-direction: column; }
    }
  </style>
</head>

<body class="auth-page">

  <!-- Decorative Backgrounds -->
  <div class="auth-circle-bg"></div>
  <div class="auth-lines-bg">
    <svg viewBox="0 0 1440 900" fill="none" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <!-- Diagonal elegant lines -->
      <line x1="0" y1="200" x2="500" y2="900" stroke="rgba(16,185,129,0.04)" stroke-width="1"/>
      <line x1="100" y1="0" x2="700" y2="900" stroke="rgba(16,185,129,0.03)" stroke-width="1"/>
      <line x1="300" y1="0" x2="900" y2="900" stroke="rgba(16,185,129,0.025)" stroke-width="1"/>
      <line x1="600" y1="0" x2="1440" y2="800" stroke="rgba(16,185,129,0.03)" stroke-width="1"/>
      <line x1="900" y1="0" x2="1440" y2="400" stroke="rgba(16,185,129,0.02)" stroke-width="1"/>
      <!-- Horizontal subtle lines -->
      <line x1="0" y1="150" x2="1440" y2="150" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
      <line x1="0" y1="450" x2="1440" y2="450" stroke="rgba(255,255,255,0.015)" stroke-width="1"/>
      <line x1="0" y1="750" x2="1440" y2="750" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
      <!-- Subtle dots grid -->
      <circle cx="200" cy="100" r="1.5" fill="rgba(16,185,129,0.15)"/>
      <circle cx="400" cy="300" r="1" fill="rgba(16,185,129,0.1)"/>
      <circle cx="1200" cy="200" r="1.5" fill="rgba(16,185,129,0.12)"/>
      <circle cx="1000" cy="600" r="1" fill="rgba(16,185,129,0.1)"/>
      <circle cx="150" cy="700" r="1" fill="rgba(16,185,129,0.08)"/>
    </svg>
  </div>

  <!-- Header -->
  <header class="auth-header">
    <a href="index.html" class="logo" id="auth-logo">
      <div class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      Aura<span>Wealth</span>
    </a>
    <a href="register.html" class="btn btn-primary" id="auth-header-register" style="padding: 0.6rem 1.5rem; font-size: 0.9rem;">Create Account</a>
  </header>

  <!-- Main Login Card -->
  <main class="auth-main">
    <div class="auth-card">
      <div class="auth-card-top">
        <div class="auth-logo-mark">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <h1>Welcome Back</h1>
        <p>Log in to continue managing your wealth.</p>
      </div>

      <form class="auth-form" id="login-form" novalidate>
        <!-- Email -->
        <div class="form-group">
          <label class="form-label" for="login-email">Email Address</label>
          <div class="form-input-wrapper">
            <input type="email" class="form-input" id="login-email" placeholder="you@example.com" autocomplete="email" required>
            <svg class="form-input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <div class="form-input-wrapper">
            <input type="password" class="form-input" id="login-password" placeholder="Enter your password" autocomplete="current-password" required>
            <svg class="form-input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <button type="button" class="password-toggle" id="password-toggle-login" aria-label="Toggle password visibility">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Remember & Forgot -->
        <div class="form-row-between">
          <label class="checkbox-label">
            <input type="checkbox" id="remember-me">
            Remember me for 30 days
          </label>
          <a href="#" class="auth-link" id="forgot-password-link">Forgot password?</a>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-auth" id="btn-login-submit">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
            <polyline points="10 17 15 12 10 7"/>
            <line x1="15" y1="12" x2="3" y2="12"/>
          </svg>
          Log In to AuraWealth
        </button>
      </form>

      <div class="auth-divider" style="margin: 1.75rem 0 1.25rem;">or continue with</div>

      <div class="social-auth-btns">
        <button class="btn-social" id="btn-google-login">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Google
        </button>
        <button class="btn-social" id="btn-phone-login">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="5" y="2" width="14" height="20" rx="2" ry="2"/>
            <line x1="12" y1="18" x2="12.01" y2="18"/>
          </svg>
          Mobile OTP
        </button>
      </div>

      <div class="auth-trust-row">
        <div class="auth-trust-item">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          256-bit Encrypted
        </div>
        <div class="auth-trust-item">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          SEBI Registered
        </div>
        <div class="auth-trust-item" id="secret-admin-btn" style="user-select: none; cursor: default;">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          ISO 27001 Certified
        </div>
      </div>

      <div class="auth-footer-text">
        Don't have an account?
        <a href="register.html" class="auth-link" id="auth-goto-register" style="margin-left: 0.25rem;">Create one free →</a>
      </div>
    </div>
  </main>

  <script>
    // Admin 5-click logic
    let adminClickCount = 0;
    let adminClickTimer;
    const secretAdminBtn = document.getElementById('secret-admin-btn');
    if (secretAdminBtn) {
      secretAdminBtn.addEventListener('click', () => {
        adminClickCount++;
        clearTimeout(adminClickTimer);
        adminClickTimer = setTimeout(() => { adminClickCount = 0; }, 3000);
        
        if (adminClickCount >= 5) {
          window.location.href = 'admin-login.html';
        }
      });
    }

    // Password toggle
    const pwToggle = document.getElementById('password-toggle-login');
    const pwInput = document.getElementById('login-password');
    if (pwToggle && pwInput) {
      pwToggle.addEventListener('click', () => {
        const isHidden = pwInput.type === 'password';
        pwInput.type = isHidden ? 'text' : 'password';
        pwToggle.innerHTML = isHidden
          ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
          : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
      });
    }

    // Read email from URL query param and pre-fill
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const emailParam = urlParams.get('email');
      if (emailParam) {
        const emailInput = document.getElementById('login-email');
        if (emailInput) {
          emailInput.value = emailParam;
          
          // Show a temporary message above the form
          const form = document.getElementById('login-form');
          const msg = document.createElement('div');
          msg.style.color = 'var(--accent-emerald)';
          msg.style.background = 'rgba(16, 185, 129, 0.1)';
          msg.style.padding = '10px';
          msg.style.borderRadius = '8px';
          msg.style.marginBottom = '15px';
          msg.style.fontSize = '0.9rem';
          msg.style.textAlign = 'center';
          msg.innerHTML = 'Registration successful! Please enter your password to log in.';
          form.insertBefore(msg, form.firstChild);

          // Focus password field
          setTimeout(() => {
            document.getElementById('login-password').focus();
          }, 100);
        }
      }
    });

    // Form submit
    const loginForm = document.getElementById('login-form');
    if (loginForm) {
      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn-login-submit');
        
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;

        btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10" stroke-dasharray="62.83" stroke-dashoffset="0" style="animation: none"><animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="0.8s" repeatCount="indefinite"/></circle></svg> Logging in...';
        btn.disabled = true;

        try {
          const response = await fetch('http://localhost:3000/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });

          const data = await response.json();

          if (response.ok) {
            // Save user to localStorage
            localStorage.setItem('user', JSON.stringify(data));
            window.location.href = 'index.html';
          } else {
            alert('Login Failed: ' + data.error);
            btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Log In to AuraWealth';
            btn.disabled = false;
          }
        } catch (err) {
          console.error(err);
          alert('Failed to connect to the server.');
          btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Log In to AuraWealth';
          btn.disabled = false;
        }
      });
    }
  </script>
</body>

</html>
