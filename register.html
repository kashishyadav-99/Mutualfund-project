<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account | AuraWealth — Start Investing Today</title>
  <meta name="description" content="Open your free AuraWealth investment account in 2 minutes. Zero commission, direct mutual funds, automated SIPs. Start with ₹500.">
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Auth Page Specific Styles ── */
    .auth-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: radial-gradient(ellipse at 70% 0%, rgba(16,185,129,0.08) 0%, transparent 60%),
                  radial-gradient(ellipse at 20% 100%, rgba(251,191,36,0.05) 0%, transparent 55%),
                  var(--navy);
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
    }

    .auth-circle-bg {
      position: fixed;
      top: -120px;
      right: -160px;
      width: 560px;
      height: 560px;
      border-radius: 50%;
      border: 1.5px solid rgba(16,185,129,0.10);
      pointer-events: none;
      z-index: 0;
    }
    .auth-circle-bg::before {
      content: '';
      position: absolute;
      inset: 40px;
      border-radius: 50%;
      border: 1px solid rgba(16,185,129,0.07);
    }
    .auth-circle-bg::after {
      content: '';
      position: absolute;
      inset: 100px;
      border-radius: 50%;
      border: 1px solid rgba(16,185,129,0.05);
      background: radial-gradient(circle, rgba(16,185,129,0.04) 0%, transparent 70%);
    }

    .auth-lines-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .auth-lines-bg svg {
      width: 100%;
      height: 100%;
      opacity: 0.4;
    }

    .auth-header {
      position: relative;
      z-index: 10;
      padding: 1.5rem 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .auth-main {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2.5rem 1.5rem 3rem;
      position: relative;
      z-index: 2;
    }

    .auth-card {
      background: linear-gradient(145deg, rgba(26,48,85,0.95) 0%, rgba(16,32,64,0.92) 100%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 2.75rem 3.5rem;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 32px 64px -12px rgba(0,0,0,0.6), 0 0 0 1px rgba(16,185,129,0.05);
      backdrop-filter: blur(20px);
      position: relative;
      overflow: hidden;
    }

    .auth-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent-emerald), var(--accent-gold), var(--accent-emerald));
      background-size: 200% 100%;
      animation: shimmerGradient 4s infinite linear;
    }

    @keyframes shimmerGradient {
      0% { background-position: 0% 0%; }
      100% { background-position: 200% 0%; }
    }

    .auth-card-top {
      text-align: center;
      margin-bottom: 2rem;
    }

    .auth-logo-mark {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--accent-emerald), #059669);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.25rem;
      box-shadow: 0 8px 24px rgba(16,185,129,0.3);
      color: var(--navy);
    }

    .auth-card-top h1 {
      font-size: 1.75rem;
      margin-bottom: 0.375rem;
    }

    .auth-card-top p {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    /* Steps progress indicator */
    .step-progress {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      margin-bottom: 2rem;
    }

    .step-dot {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-muted);
      font-family: 'Outfit', sans-serif;
      transition: all 0.3s;
      position: relative;
      z-index: 2;
    }

    .step-dot.active {
      border-color: var(--accent-emerald);
      background: rgba(16,185,129,0.15);
      color: var(--accent-emerald);
    }

    .step-dot.done {
      border-color: var(--accent-emerald);
      background: var(--accent-emerald);
      color: var(--navy);
    }

    .step-line {
      flex: 1;
      height: 2px;
      background: rgba(255,255,255,0.07);
      max-width: 60px;
    }

    .step-line.done {
      background: var(--accent-emerald);
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .form-label {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-input-wrapper {
      position: relative;
    }

    .form-input-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
      transition: color 0.2s;
    }

    .form-input {
      width: 100%;
      background: rgba(10,22,40,0.8);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 0.875rem 1rem 0.875rem 2.75rem;
      color: var(--text-white);
      font-size: 0.95rem;
      transition: all 0.2s;
      outline: none;
    }

    .form-input.no-icon {
      padding-left: 1rem;
    }

    .form-input::placeholder { color: var(--text-muted); }

    .form-input:focus {
      border-color: rgba(16,185,129,0.4);
      background: rgba(16,185,129,0.04);
      box-shadow: 0 0 0 3px rgba(16,185,129,0.08);
    }

    .form-input-wrapper:focus-within .form-input-icon {
      color: var(--accent-emerald);
    }

    .form-hint {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.125rem;
    }

    /* Password strength bar */
    .password-strength {
      height: 3px;
      border-radius: 2px;
      background: rgba(255,255,255,0.07);
      margin-top: 0.5rem;
      overflow: hidden;
    }

    .password-strength-bar {
      height: 100%;
      border-radius: 2px;
      width: 0;
      transition: width 0.3s, background 0.3s;
    }

    .strength-text {
      font-size: 0.7rem;
      margin-top: 0.25rem;
      color: var(--text-muted);
    }

    /* Terms checkbox */
    .terms-agree {
      display: flex;
      gap: 0.75rem;
      align-items: flex-start;
      font-size: 0.8125rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .terms-agree input[type="checkbox"] {
      accent-color: var(--accent-emerald);
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .auth-link {
      color: var(--accent-emerald);
      font-weight: 500;
      text-decoration: none;
    }
    .auth-link:hover { opacity: 0.75; }

    .btn-auth {
      background: linear-gradient(135deg, var(--accent-emerald), #059669);
      color: var(--navy);
      border: none;
      border-radius: 10px;
      padding: 1rem;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      box-shadow: 0 4px 14px rgba(16,185,129,0.3);
      margin-top: 0.25rem;
    }
    .btn-auth:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(16,185,129,0.45);
    }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      color: var(--text-muted);
      font-size: 0.8125rem;
    }
    .auth-divider::before, .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.07);
    }

    .social-auth-btns {
      display: flex;
      gap: 1rem;
    }

    .btn-social {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 0.75rem;
      color: var(--text-secondary);
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .btn-social:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.15);
      color: var(--text-white);
      transform: translateY(-1px);
    }

    /* Benefits strip */
    .register-benefits {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      padding: 1.25rem;
      background: rgba(16,185,129,0.04);
      border: 1px solid rgba(16,185,129,0.1);
      border-radius: 12px;
    }

    .reg-benefit {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .reg-benefit svg {
      color: var(--accent-emerald);
      flex-shrink: 0;
    }

    .auth-footer-text {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    .password-toggle {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0;
      transition: color 0.2s;
    }
    .password-toggle:hover { color: var(--text-secondary); }

    @media (max-width: 600px) {
      .auth-card {
        padding: 2rem 1.25rem;
        border-radius: 20px;
      }
      .form-row { grid-template-columns: 1fr; }
      .register-benefits { grid-template-columns: 1fr; }
      .social-auth-btns { flex-direction: column; }
    }
  </style>
</head>

<body class="auth-page">

  <!-- Decorative Backgrounds -->
  <div class="auth-circle-bg"></div>

    <svg viewBox="0 0 1440 900" fill="none" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">

  <!-- Header -->
  <header class="auth-header">
    <a href="index.html" class="logo" id="reg-logo">
      <div class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">

  <main class="auth-main">

          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>

      <!-- Benefits Strip -->
      <div class="register-benefits">
        <div class="reg-benefit">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>

        </div>
        <div class="reg-benefit">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          Zero Commission
        </div>
        <div class="reg-benefit">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          Paperless KYC
        </div>
        <div class="reg-benefit">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          SEBI Regulated
        </div>
      </div>

      <!-- Step progress -->
      <div class="step-progress" id="reg-step-progress">

      <!-- Step 1: Personal Info -->

  <script>
    // Password strength checker
    const pwInput = document.getElementById('reg-password');
    const pwBar = document.getElementById('pw-strength-bar');
    const pwText = document.getElementById('pw-strength-text');

    if (pwInput) {
      pwInput.addEventListener('input', () => {
        const val = pwInput.value;
        let score = 0;
        if (val.length >= 8) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;

        const colors = ['#EF4444','#F97316','#FBBF24','#10B981'];
        const labels = ['Too weak','Fair','Good','Strong'];
        const widths = ['25%','50%','75%','100%'];

        if (val.length === 0) {
          pwBar.style.width = '0';
          pwText.textContent = '';
        } else {
          pwBar.style.width = widths[score - 1] || '25%';
          pwBar.style.background = colors[score - 1] || '#EF4444';
          pwText.textContent = labels[score - 1] || 'Too weak';
          pwText.style.color = colors[score - 1] || '#EF4444';
        }
      });
    }

    // Password toggle
    const pwToggle = document.getElementById('password-toggle-reg');
    if (pwToggle && pwInput) {
      pwToggle.addEventListener('click', () => {
        const isHidden = pwInput.type === 'password';
        pwInput.type = isHidden ? 'text' : 'password';
      });
    }

    // Form submit
    const regForm = document.getElementById('register-form');
    if (regForm) {
      regForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn-register-submit');
        
        const fname = document.getElementById('reg-fname').value;
        const lname = document.getElementById('reg-lname').value;
        const email = document.getElementById('reg-email').value;
        const phone = document.getElementById('reg-phone').value;
        const password = document.getElementById('reg-password').value;

        btn.textContent = 'Creating your account...';
        btn.disabled = true;

        try {
          const response = await fetch('http://localhost:3000/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ firstName: fname, lastName: lname, email, mobile: phone, password })
          });

          const data = await response.json();

          if (response.ok) {
            // Step progress animation for success
            const sdot1 = document.getElementById('sdot-1');
            const sdot2 = document.getElementById('sdot-2');
            const sline1 = document.getElementById('sline-1');

            sdot1.classList.add('done');
            sdot1.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>';
            sline1.classList.add('done');
            sdot2.classList.add('active');
            sdot2.textContent = '2';
            btn.textContent = 'Setup Complete! Redirecting...';

            // hide any previous error
            const regError = document.getElementById('reg-error');
            if (regError) regError.style.display = 'none';

            setTimeout(() => {
              window.location.href = `login.html?email=${encodeURIComponent(email)}`;
            }, 1000);
          } else {
            let errorMsg = data.error || (data.errors && data.errors[0].msg) || 'Unknown error';
            const regError = document.getElementById('reg-error');
            if (regError) {
              regError.textContent = 'Registration Failed: ' + errorMsg;
              regError.style.display = 'block';
            } else {
              alert('Registration Failed: ' + errorMsg);
            }
            btn.textContent = 'Create My Free Account';
            btn.disabled = false;
          }
        } catch (err) {
          console.error(err);
          const regError = document.getElementById('reg-error');
          if (regError) {
            regError.textContent = 'Failed to connect to the server.';
            regError.style.display = 'block';
          } else {
            alert('Failed to connect to the server.');
          }
          btn.textContent = 'Create My Free Account';
          btn.disabled = false;
        }
      });
    }
  </script>
</body>

</html>
