<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | AuraWealth</title>
  <meta name="description" content="AuraWealth Admin Portal Login">
  <link rel="stylesheet" href="style.css">
  <style>
    :root {
      --accent-emerald: #7c3aed; /* Purple theme */
      --accent-gold: #fbbf24;
    }

    /* ── Auth Page Specific Styles ── */
    .auth-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: radial-gradient(ellipse at 70% 0%, rgba(124,58,237,0.12) 0%, transparent 60%),
                  radial-gradient(ellipse at 20% 100%, rgba(251,191,36,0.05) 0%, transparent 55%),
                  var(--navy);
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
    }

    /* Decorative circle right side */
    .auth-circle-bg {
      position: fixed;
      top: -120px;
      right: -160px;
      width: 560px;
      height: 560px;
      border-radius: 50%;
      border: 1.5px solid rgba(124,58,237,0.10);
      pointer-events: none;
      z-index: 0;
    }
    .auth-circle-bg::before {
      content: '';
      position: absolute;
      inset: 40px;
      border-radius: 50%;
      border: 1px solid rgba(124,58,237,0.07);
    }
    .auth-circle-bg::after {
      content: '';
      position: absolute;
      inset: 100px;
      border-radius: 50%;
      border: 1px solid rgba(124,58,237,0.05);
      background: radial-gradient(circle, rgba(124,58,237,0.04) 0%, transparent 70%);
    }

    /* Elegant line grid background */
    .auth-lines-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .auth-lines-bg svg {
      width: 100%;
      height: 100%;
      opacity: 0.7;
    }

    .auth-header {
      position: relative;
      z-index: 10;
      padding: 1.5rem 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .auth-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      position: relative;
      z-index: 2;
    }

    .auth-card {
      background: linear-gradient(145deg, rgba(26,48,85,0.95) 0%, rgba(16,32,64,0.92) 100%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 3rem 3.5rem;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 32px 64px -12px rgba(0,0,0,0.6), 0 0 0 1px rgba(124,58,237,0.05);
      backdrop-filter: blur(20px);
      position: relative;
      overflow: hidden;
    }

    .auth-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent-emerald), var(--accent-gold), var(--accent-emerald));
      background-size: 200% 100%;
      animation: shimmerGradient 4s infinite linear;
    }

    @keyframes shimmerGradient {
      0% { background-position: 0% 0%; }
      100% { background-position: 200% 0%; }
    }

    .auth-card-top {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .auth-logo-mark {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--accent-emerald), #5b21b6);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.25rem;
      box-shadow: 0 8px 24px rgba(124,58,237,0.3);
      color: #fff;
    }

    .auth-card-top h1 {
      font-size: 1.875rem;
      margin-bottom: 0.5rem;
    }

    .auth-card-top p {
      color: var(--text-secondary);
      font-size: 0.95rem;
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .form-label {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-input-wrapper {
      position: relative;
    }

    .form-input-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
      transition: color 0.2s;
    }

    .form-input {
      width: 100%;
      background: rgba(10,22,40,0.8);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 0.875rem 1rem 0.875rem 2.75rem;
      color: var(--text-white);
      font-size: 0.975rem;
      transition: all 0.2s;
      outline: none;
    }

    .form-input::placeholder {
      color: var(--text-muted);
    }

    .form-input:focus {
      border-color: rgba(124,58,237,0.4);
      background: rgba(124,58,237,0.04);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.08);
    }

    .form-input:focus + .form-input-icon,
    .form-input-wrapper:focus-within .form-input-icon {
      color: var(--accent-emerald);
    }

    .btn-auth {
      background: linear-gradient(135deg, var(--accent-emerald), #5b21b6);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 1rem;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      box-shadow: 0 4px 14px rgba(124,58,237,0.3);
      margin-top: 0.5rem;
    }
    .btn-auth:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(124,58,237,0.45);
    }

    /* Password toggle */
    .password-toggle {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0;
      transition: color 0.2s;
    }
    .password-toggle:hover { color: var(--text-secondary); }

    @media (max-width: 600px) {
      .auth-card {
        padding: 2rem 1.5rem;
        border-radius: 20px;
        margin: 0 0.5rem;
      }
    }
    
    /* Notification styling */
    #admin-notification {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #10b981;
      color: #fff;
      padding: 1rem 2rem;
      border-radius: 12px;
      font-weight: 600;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      z-index: 1000;
      display: none;
      align-items: center;
      gap: 0.75rem;
    }
  </style>
</head>

<body class="auth-page">

  <!-- Success Notification -->
  <div id="admin-notification">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
      <polyline points="22 4 12 14.01 9 11.01"></polyline>
    </svg>
    Admin successful login
  </div>

  <!-- Decorative Backgrounds -->
  <div class="auth-circle-bg"></div>
  <div class="auth-lines-bg">
    <svg viewBox="0 0 1440 900" fill="none" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <line x1="0" y1="200" x2="500" y2="900" stroke="rgba(124,58,237,0.04)" stroke-width="1"/>
      <line x1="100" y1="0" x2="700" y2="900" stroke="rgba(124,58,237,0.03)" stroke-width="1"/>
      <line x1="300" y1="0" x2="900" y2="900" stroke="rgba(124,58,237,0.025)" stroke-width="1"/>
      <line x1="600" y1="0" x2="1440" y2="800" stroke="rgba(124,58,237,0.03)" stroke-width="1"/>
      <line x1="900" y1="0" x2="1440" y2="400" stroke="rgba(124,58,237,0.02)" stroke-width="1"/>
    </svg>
  </div>

  <!-- Header -->
  <header class="auth-header">
    <a href="index.html" class="logo" id="auth-logo">
      <div class="logo-icon" style="background: var(--accent-emerald); color: #fff;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      Aura<span>Wealth</span>
    </a>
    <a href="login.html" class="btn" style="border: 1px solid rgba(255,255,255,0.1); padding: 0.6rem 1.5rem; font-size: 0.9rem; color: #fff; text-decoration: none; border-radius: 8px;">User Login</a>
  </header>

  <!-- Main Login Card -->
  <main class="auth-main">
    <div class="auth-card">
      <div class="auth-card-top">
        <div class="auth-logo-mark">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <h1>Admin Portal</h1>
        <p>Log in to manage users and platform data.</p>
      </div>

      <form class="auth-form" id="admin-login-form" novalidate>
        <!-- Username -->
        <div class="form-group">
          <label class="form-label" for="login-username">Admin Username</label>
          <div class="form-input-wrapper">
            <input type="text" class="form-input" id="login-username" placeholder="Enter admin username" required>
            <svg class="form-input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <div class="form-input-wrapper">
            <input type="password" class="form-input" id="login-password" placeholder="Enter your password" required>
            <svg class="form-input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <button type="button" class="password-toggle" id="password-toggle-login" aria-label="Toggle password visibility">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-auth" id="btn-login-submit">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
            <polyline points="10 17 15 12 10 7"/>
            <line x1="15" y1="12" x2="3" y2="12"/>
          </svg>
          Access Dashboard
        </button>
      </form>
    </div>
  </main>

  <script>
    // Password toggle
    const pwToggle = document.getElementById('password-toggle-login');
    const pwInput = document.getElementById('login-password');
    if (pwToggle && pwInput) {
      pwToggle.addEventListener('click', () => {
        const isHidden = pwInput.type === 'password';
        pwInput.type = isHidden ? 'text' : 'password';
        pwToggle.innerHTML = isHidden
          ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
          : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
      });
    }

    // Form submit
    const loginForm = document.getElementById('admin-login-form');
    const notification = document.getElementById('admin-notification');
    
    if (loginForm) {
      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn-login-submit');
        
        const username = document.getElementById('login-username').value;
        const password = document.getElementById('login-password').value;

        btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10" stroke-dasharray="62.83" stroke-dashoffset="0" style="animation: none"><animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="0.8s" repeatCount="indefinite"/></circle></svg> Verifying...';
        btn.disabled = true;

        try {
          const response = await fetch('http://localhost:3000/api/admin-login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
          });

          const data = await response.json();

          if (response.ok) {
            // Save admin token
            localStorage.setItem('adminToken', data.token);
            localStorage.setItem('adminUser', JSON.stringify(data.admin));
            
            // Show success popup
            notification.style.display = 'flex';
            
            // Redirect after brief delay to show popup
            setTimeout(() => {
              window.location.href = 'admin-dashboard.html';
            }, 1500);
          } else {
            alert('Admin Login Failed: ' + data.error);
            btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Access Dashboard';
            btn.disabled = false;
          }
        } catch (err) {
          console.error(err);
          alert('Failed to connect to the server.');
          btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Access Dashboard';
          btn.disabled = false;
        }
      });
    }
  </script>
</body>
</html>
